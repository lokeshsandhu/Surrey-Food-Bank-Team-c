services:
  - type: web
    runtime: static
    name: surrey-food-bank-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: surrey-food-bank-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: node
    name: surrey-food-bank-api
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run db:migrate && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        fromService:
          type: web
          name: surrey-food-bank-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        fromDatabase:
          name: surrey-food-bank-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true

databases:
  - name: surrey-food-bank-db
    plan: free
    region: oregon
    postgresMajorVersion: "18"
    databaseName: sfb_db
